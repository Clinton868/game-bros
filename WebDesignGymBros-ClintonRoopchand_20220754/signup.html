<!--MAIN CONTENT CONTAINER FLUID-->
<h2 class="text-center mb-4">Create Your Game Bros Account</h2>


<form class="row g-3 justify-content-center" onsubmit="redirectToHome(event)">
  <div class="col-md-5">
    <label for="validationDefault01" class="form-label">First name</label>
    <input type="text" class="form-control" id="validationDefault01" value="" required placeholder="John">
  </div>
  <div class="col-md-5">
    <label for="validationDefault02" class="form-label">Last name</label>
    <input type="text" class="form-control" id="validationDefault02" value="" required placeholder="Cena">
  </div>
    <div class="col-md-10">
      <label for="validationDefaultUsername" class="form-label">Email</label>
      <div class="input-group">
        <span class="input-group-text" id="inputGroupPrepend2">@</span>
        <input type="email" class="form-control" id="validationDefaultEmail" placeholder="john.cena@example.com" aria-describedby="inputGroupPrepend2" required>
      </div>
    </div>

  <div class="col-md-10">
    <label for="validationDefaultUsername" class="form-label">Username</label>
    <div class="input-group">
      <span class="input-group-text" id="inputGroupPrepend2">@</span>
      <input type="text" class="form-control" id="validationDefaultUsername" placeholder="JohnCena007" aria-describedby="inputGroupPrepend2" required>
    </div>
  </div>
  <div class="col-md-5">
    <label for="validationDefault03" class="form-label">City</label>
    <input type="text" class="form-control" id="validationDefault03" required placeholder="New York">
  </div>
  <div class="col-md-5">
    <label for="validationDefault04" class="form-label">Country</label>
    <select class="form-select" id="validationDefault04" required>
      <option selected disabled value="">Choose...</option>
      <option>Trinidad & Tobago</option>
      <option>Jamaica</option>
      <option>Barbados</option>
      <option>Bahamas</option>
      <option>Grenada</option>   
      <option>Guyana</option>
      <option>other</option>
    </select>
  </div>
  <div class="col-md-10">
    <label for="validationDefault05" class="form-label">Password</label>
    <input type="password" class="form-control" id="validationDefault05" required placeholder="Enter a strong password">
  </div>
  
  <div class="col-10">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="invalidCheck2" required>
      <label class="form-check-label" for="invalidCheck2">
        Agree to terms and conditions
      </label>
    </div>
  </div>
  <div class="col-10">
    <button class="btn btn-primary" type="submit">Submit form</button>
  </div>
</form>
<script>
function redirectToHome(event) {
    event.preventDefault(); // stops normal form submission
    window.location.href = "index.html"; // redirect
}
</script>
